  <head>

    <div class="container my-5">

    <div class="container">
        <nav>
            <ul class="nav nav-pills">
                <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>

        <div id="mediaArea" class="d-flex align-items-center justify-content-center mt-5" style="">

                <div class="mediaScreen text-center" style="position:relative; width:480px; height:360px;">
                    <button id="playButton" class="btn btn-primary"
                      style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:1.25rem; padding:0.75rem 1.5rem; z-index:10;">
                      Play with Sound
                    </button>

                    <img id="headbop" src="images/headbop.gif" alt="headbop" class="img-fluid"
                        style="max-width:100%; max-height:100%; display:block; position:absolute; left:50%; top:38%; transform:translate(-50%,-60%); z-index:1; pointer-events:none;" />

                    <img id="randomImage1" src="" alt="Random" style="display:none; max-width:100%; max-height:100%; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:1; pointer-events:none;" />
                    <video id="randomVideo1" autoplay loop playsinline width="480" height="360" style="display:none; position:absolute; left:50%; top:50%; transform:translate(-50%,-40%); z-index:1;">
                      <source id="videoSource1" src="" type="video/mp4" />
                      Your browser does not support the video tag.
                    </video>
                </div>
            

        </div>




        <audio id="changeSound" src="audio/change.mp3" preload="auto"></audio>
    </div>

    <script type="module" src="js/custom.js" defer></script>

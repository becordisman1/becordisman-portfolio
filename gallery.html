<script>
  const container = document.querySelector('.row');

  for (let i = 1; i <= 34; i++) {
    const col = document.createElement('div');
    col.className = 'col';

    // Encode special characters in filenames
    const videoFilename = `video/video%20(${i}).mp4`; // spaces and parentheses are encoded

    col.innerHTML = `
      <video class="video-thumb" muted preload="metadata" src="${videoFilename}"></video>
    `;
    container.appendChild(col);
  }

  // Click to fullscreen + play
  document.addEventListener('click', function(e) {
    if (e.target.tagName.toLowerCase() === 'video') {
      const video = e.target;

      // Fullscreen API
      if (video.requestFullscreen) {
        video.requestFullscreen();
      } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
      } else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
      }

      video.play();
    }
  });
</script>

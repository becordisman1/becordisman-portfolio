<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Becordisman - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">


    <style>
      @media (max-width: 576px) {
        #playButton {
          font-size: 0.95rem !important;
          padding: 0.4rem 0.9rem !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="container mt-4">  
        <h1>Becordisman </h1>
        <p>smooth world oracle</p>
        <div class="row">
            <div class="col-md-12">
                <nav>
                    <ul class="nav nav-pills">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About me</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="row mt-3">
            <div class="col-10 col-sm-8 col-md-5 col-lg-4">
                <h6>Contact</h6>
                <form id="contactForm">
                    <div class="mb-2">
                        <input type="text" class="form-control form-control-sm" id="name" name="name" placeholder="Name" required>
                    </div>
                    <div class="mb-2">
                        <input type="email" class="form-control form-control-sm" id="email" name="email" placeholder="Email" required>
                    </div>
                    <div class="mb-2">
                        <input type="text" class="form-control form-control-sm" id="subject" name="subject" placeholder="Subject" required>
                    </div>
                    <div class="mb-2">
                        <textarea class="form-control form-control-sm" id="message" name="message" rows="3" placeholder="Message" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">Send</button>
                    <div id="formStatus" class="mt-3"></div>
                </form>
            </div>
        </div>

    </div>
  </div>
  </div>





    <script type="module" src="js/custom.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
